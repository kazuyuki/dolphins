<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Dolphins order</title>
<script tyep="text/javascript">
window.onload = function(){

	var member = [

		{ 4:"瑛太", 5:"来輝", 6:"煌太" },
		{ 7:"拓英", 8:"颯也", 9:"源臣", 10:"玲央", 11:"理人" },
		{ 12:"恭平", 13:"駿太" }

	];

	var table = document.createElement("table");
	//table.border = 1;
	for ( i =0; i < member.length; i++ ) {
		for ( var key in member[i] ) {
			tr  = table.insertRow(-1);
			tr.insertCell(-1).innerHTML = key;
			tr.insertCell(-1).innerHTML = member[i][key];
			for ( q = 1; q <= 4; q++ ) {
				td = tr.insertCell(-1);
				const cb = document.createElement("input");
				cb.setAttribute("type", "checkbox");
				cb.setAttribute("value", key + "." + q);
				td.appendChild(cb);
			}
		}
		tr = table.insertRow(-1);
		for ( q = 1; q <= 6; q++ ) {
			td = tr.insertCell(-1).innerHTML = "<center>----</center>";
		}
	}	
	document.getElementById("tableID").appendChild(table);
}
</script>
</head>
<body>
<form>
<div id="tableID"></div>
</form>
</body>
</html>
