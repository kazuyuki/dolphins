function getNumber(){
	let r = document.getElementsByName("number");

		}
	}
	return "UNDEF";
}
function del(){
	record.pop();

}
function period(){
	record.push("----\n");

}
function disp(){
	text = "";
	record.slice().reverse().forEach(function(value){

	});
	document.form1.textarea1.value = text;
	
	text = "";

}
